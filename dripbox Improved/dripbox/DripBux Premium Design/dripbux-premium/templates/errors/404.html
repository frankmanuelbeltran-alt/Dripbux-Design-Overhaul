{% extends 'base.html' %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<section class="error-section">
    <div class="container">
        <div class="error-card">
            <div class="error-code">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-description">The page you're looking for doesn't exist or has been moved.</p>
            <div class="error-actions">
                <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg btn-glow">
                    <i data-lucide="{{ icons.ICONS.home }}"></i>
                    Go Home
                </a>
                <a href="{{ url_for('shop.index') }}" class="btn btn-outline btn-lg">
                    <i data-lucide="{{ icons.ICONS.shop }}"></i>
                    Browse Shop
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
