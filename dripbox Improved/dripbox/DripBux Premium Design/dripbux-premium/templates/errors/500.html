{% extends 'base.html' %}

{% block title %}Server Error{% endblock %}

{% block content %}
<section class="error-section">
    <div class="container">
        <div class="error-card">
            <div class="error-code">500</div>
            <h1 class="error-title">Something Went Wrong</h1>
            <p class="error-description">We're experiencing some technical difficulties. Please try again later.</p>
            <div class="error-actions">
                <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg btn-glow">
                    <i data-lucide="{{ icons.ICONS.home }}"></i>
                    Go Home
                </a>
                <button onclick="location.reload()" class="btn btn-outline btn-lg">
                    <i data-lucide="{{ icons.ICONS.refresh }}"></i>
                    Try Again
                </button>
            </div>
        </div>
    </div>
</section>
{% endblock %}
