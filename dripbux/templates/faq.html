{% extends 'base.html' %}
{% block title %}FAQ{% endblock %}
{% block content %}
<section class="section">
    <div class="container-narrow">
        <div style="text-align:center;margin-bottom:2rem;">
            <div style="width:64px;height:64px;border-radius:50%;background:rgba(255,77,141,0.1);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
                <i data-lucide="help-circle" style="width:28px;height:28px;color:var(--primary);"></i>
            </div>
            <h1 class="section-title">Frequently Asked Questions</h1>
            <p style="font-size:0.9375rem;color:var(--text-secondary);">Everything you need to know about DripBux</p>
        </div>
        <div style="display:flex;flex-direction:column;gap:0.75rem;">
            {% for faq in faqs %}
            <div class="faq-item card" style="padding:1.25rem;cursor:pointer;" onclick="this.classList.toggle('open');">
                <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;">
                    <h3 style="font-weight:600;font-size:0.9375rem;">{{ faq.q }}</h3>
                    <i data-lucide="chevron-down" style="width:18px;height:18px;color:var(--text-muted);transition:transform 0.3s;flex-shrink:0;"></i>
                </div>
                <p class="faq-answer" style="font-size:0.875rem;color:var(--text-secondary);line-height:1.7;margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid var(--dark-border);display:none;">{{ faq.a }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
<style>.faq-item.open .faq-answer { display:block!important; }.faq-item.open i[data-lucide="chevron-down"] { transform:rotate(180deg); }</style>
{% endblock %}
