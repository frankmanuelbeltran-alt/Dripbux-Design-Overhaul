{% extends 'base.html' %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
<section class="section" style="display:flex;align-items:center;justify-content:center;min-height:60vh;">
    <div style="text-align:center;">
        <div style="font-family:var(--font-heading);font-size:6rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--accent-purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;">404</div>
        <h1 style="font-family:var(--font-heading);font-weight:700;font-size:1.5rem;margin:1rem 0;">Page Not Found</h1>
        <p style="font-size:0.9375rem;color:var(--text-secondary);margin-bottom:1.5rem;">The page you are looking for does not exist or has been moved.</p>
        <a href="{{ url_for('main.index') }}" class="btn btn-pink"><i data-lucide="home"></i> Go Home</a>
    </div>
</section>
{% endblock %}
