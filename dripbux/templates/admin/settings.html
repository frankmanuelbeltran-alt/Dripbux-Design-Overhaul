{% extends 'base.html' %}
{% block title %}Site Settings{% endblock %}
{% block content %}
<section class="section">
    <div class="container-narrow">
        <div class="glass-panel" style="padding:2rem;">
            <h1 class="section-title" style="margin-bottom:1.5rem;">Site Settings</h1>
            <form method="POST" action="">
                {{ form.hidden_tag() }}
                <div class="form-group">{{ form.site_name.label }}{{ form.site_name(class='form-input') }}</div>
                <div class="form-group">{{ form.tagline.label }}{{ form.tagline(class='form-input') }}</div>
                <label class="checkbox-label" style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;">{{ form.maintenance_mode() }} <span class="checkbox-text">Maintenance Mode</span></label>
                <label class="checkbox-label" style="display:flex;align-items:center;gap:0.5rem;margin-bottom:1rem;">{{ form.registration_enabled() }} <span class="checkbox-text">Allow New Registrations</span></label>
                <button type="submit" class="btn btn-pink">Save Settings</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
